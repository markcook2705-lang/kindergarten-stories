<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindergarten Story Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Weekly Story Time</h1>
        <p>Scan the code, listen to the story!</p>
    </header>

    <main class="story-container">
        <div class="story-card">
            <h2>Test</h2>
            <p>Read by: Teacher Mark</p>
            <h2>The Very Hungry Caterpillar</h2>
            <p>Read by: Teacher Chris</p>
            
            <audio controls>
                <source src="audio/caterpillar.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
        <div class="story-card" id="test-two"> 
            <h2>Test Two</h2>
            <p>Read by: Teacher Mark</p>

            <audio controls>
                <source src="audio/test-two.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </main>

</body>
</html>
